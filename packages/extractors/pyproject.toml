[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "countpp-extractors"
version = "0.1.0"
description = "Extractor plugins for countpp streams"
requires-python = ">=3.10"
dependencies = [
  "countpp-schemas>=0.1.0",
  "countpp-signal-io>=0.1.0",
  "pyarrow>=15.0.0",
]
